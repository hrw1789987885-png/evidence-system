<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>列表表单配置</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
  .active-item { border-left: 3px solid #3b82f6; background: #eff6ff; }
  .inactive-item { border-left: 3px solid transparent; }
  .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
  .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
  .drag-handle { cursor: grab; }
  .drag-handle:active { cursor: grabbing; }
  .dragging { opacity: 0.4; }
  .drag-over { border-top: 2px solid #3b82f6; }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: white; padding: 10px 24px;
    border-radius: 8px; font-size: 14px; z-index: 9999;
    transition: opacity 0.3s;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .tag-text { font-size: 11px; padding: 1px 6px; border-radius: 4px; }
  .tag-join { background: #fef3c7; color: #92400e; }
  .tag-string { background: #e0f2fe; color: #075985; }
  .tag-number { background: #dcfce7; color: #166534; }
  .tag-date { background: #fae8ff; color: #86198f; }
  .tag-enum { background: #fee2e2; color: #991b1b; }
  input[type="text"], input[type="number"], select {
    border: 1px solid #d1d5db; border-radius: 5px; padding: 4px 8px;
    font-size: 13px; outline: none; background: white;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
  }
  .search-select { position: relative; flex: 1; }
  .search-select-input { width: 100%; padding-right: 30px !important; }
  .search-select-arrow {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    color: #9ca3af; font-size: 11px; pointer-events: none;
  }
  .search-select-menu {
    position: absolute; z-index: 1010; top: calc(100% + 4px); left: 0; right: 0;
    max-height: 180px; overflow-y: auto; background: white;
    border: 1px solid #d1d5db; border-radius: 6px;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
  }
  .search-select-option {
    width: 100%; text-align: left; padding: 7px 10px; font-size: 13px;
    color: #374151; background: white; border: none; cursor: pointer;
  }
  .search-select-option:hover, .search-select-option.active { background: #eff6ff; color: #1d4ed8; }
  .search-select-empty { padding: 8px 10px; font-size: 12px; color: #9ca3af; }
  .section-card {
    background: white; border: 1px solid #e5e7eb; border-radius: 8px;
    margin-bottom: 16px; overflow: hidden;
  }
  .section-header {
    background: #f8fafc; padding: 10px 16px;
    border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-weight: 600; font-size: 14px; color: #1e293b; }
  .btn-primary {
    background: #3b82f6; color: white; border: none;
    padding: 7px 18px; border-radius: 6px; font-size: 13px;
    cursor: pointer; font-weight: 500;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary {
    background: white; color: #374151; border: 1px solid #d1d5db;
    padding: 7px 16px; border-radius: 6px; font-size: 13px;
    cursor: pointer; font-weight: 500;
  }
  .btn-secondary:hover { background: #f9fafb; }
  .btn-danger { background: white; color: #ef4444; border: 1px solid #fca5a5;
    padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-add {
    color: #3b82f6; font-size: 13px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 0; border: none; background: none;
  }
  .btn-add:hover { color: #2563eb; }
  th { background: #f8fafc; font-size: 12px; color: #6b7280; font-weight: 600;
       padding: 8px 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  td { font-size: 13px; padding: 8px 10px; border-bottom: 1px solid #f1f5f9;
       color: #374151; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .field-checkbox { width: 15px; height: 15px; cursor: pointer; accent-color: #3b82f6; }
  .switch { position: relative; display: inline-flex; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider {
    position: absolute; inset: 0; cursor: pointer; border-radius: 999px;
    background: #d1d5db; transition: background 0.2s;
  }
  .switch-slider::before {
    content: ""; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px;
    background: white; border-radius: 50%; transition: transform 0.2s;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.25);
  }
  .switch input:checked + .switch-slider { background: #3b82f6; }
  .switch input:checked + .switch-slider::before { transform: translateX(16px); }
  .preview-query-box {
    background: white; border: 1px solid #e5e7eb; border-radius: 8px;
    padding: 16px; margin-bottom: 16px;
  }
  .preview-table-wrap {
    background: white; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden;
  }
  .preview-table-wrap th { background: #f1f5f9; }
  .detail-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
  }
  .detail-field {
    padding: 10px 0; border-bottom: 1px dashed #f1f5f9;
  }
  .detail-field-label {
    font-size: 12px; color: #8b95a5; margin-bottom: 4px; line-height: 1.4;
  }
  .detail-field-value {
    font-size: 13px; color: #1e293b; word-break: break-all; line-height: 1.5;
  }
  .detail-field-full { grid-column: span 3; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  /* 统计配置 */
  .stat-card {
    background: white; border: 1px solid #e5e7eb; border-radius: 8px;
    padding: 12px 16px; display: flex; flex-direction: column; gap: 2px;
  }
  .stat-card-value { font-size: 20px; font-weight: 700; color: #1e293b; }
  .stat-card-label { font-size: 11px; color: #6b7280; }
  .stat-card-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .breadcrumb-item { font-size: 13px; color: #6b7280; cursor: pointer; }
  .breadcrumb-item:hover { color: #3b82f6; }
  .breadcrumb-item.active { color: #1e293b; font-weight: 600; cursor: default; }
  .breadcrumb-sep { color: #d1d5db; margin: 0 6px; font-size: 12px; }
  .drill-link { color: #3b82f6; font-size: 13px; cursor: pointer; font-weight: 500; }
  .drill-link:hover { color: #2563eb; text-decoration: underline; }
  .stat-table th { white-space: nowrap; }
  .stat-table td { white-space: nowrap; }
  .stat-table tr[onclick]:hover { background: #f0f7ff !important; }

  /* 一级菜单 */
  .menu-sidebar { width: 200px; background: #1e293b; display: flex; flex-direction: column; flex-shrink: 0; }
  .menu-sidebar-header { padding: 16px 16px 12px; color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
  .menu-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: #cbd5e1; font-size: 14px; cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; user-select: none; }
  .menu-item:hover { background: #334155; color: #f1f5f9; }
  .menu-item.active { background: #1e3a5f; color: #60a5fa; border-left-color: #3b82f6; font-weight: 600; }
  .menu-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
</style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

<!-- 顶部导航栏 -->
<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-3 shrink-0">
  <div class="w-7 h-7 bg-blue-600 rounded-md flex items-center justify-center">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
      <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
      <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
    </svg>
  </div>
  <span class="font-semibold text-gray-800 text-base">基础管控自定义配置</span>
  <span class="text-gray-300 text-sm ml-1">/ 后台管理系统</span>
  <div class="ml-auto flex items-center gap-2 text-xs text-gray-400">
    <span id="saveStatus">未保存</span>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">
  <!-- =========== 一级菜单 =========== -->
  <nav class="menu-sidebar">
    <div class="menu-sidebar-header">功能导航</div>
    <div class="menu-item active" id="menu-list" onclick="switchMenu('list')">
      <span class="menu-icon">📋</span>列表表单配置
    </div>
    <div class="menu-item" id="menu-stats" onclick="switchMenu('stats')">
      <span class="menu-icon">📊</span>统计配置
    </div>
  </nav>

  <!-- =========== 列表表单配置页面 =========== -->
  <div id="page-list-config" class="flex flex-1 overflow-hidden">

  <!-- =========== 左侧列表表单 =========== -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
    <div class="px-4 py-3 border-b border-gray-100">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">列表表单</p>
    </div>
    <div class="flex-1 overflow-y-auto py-2" id="sidebarList"></div>
    <div class="p-3 border-t border-gray-100">
      <button class="w-full btn-secondary text-blue-600 border-blue-200 hover:bg-blue-50 flex items-center justify-center gap-1"
              onclick="openNewModal()">
        <span class="text-lg leading-none">+</span> 新增表单
      </button>
    </div>
  </aside>

  <!-- =========== 右侧工作区 =========== -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- 右侧顶部：标准件名称 + Tab -->
    <div class="bg-white border-b border-gray-200 px-6 py-0 shrink-0">
      <div class="flex items-center gap-4 pt-3 pb-0">
        <span class="text-base font-semibold text-gray-800" id="workspaceTitle">客户管理</span>
        <span class="text-xs text-gray-400 bg-gray-100 rounded px-2 py-0.5" id="workspaceTable">customer</span>
      </div>
      <div class="flex gap-6 mt-2">
        <button class="tab-active pb-2 text-sm" id="tab-list" onclick="switchTab('list')">列表配置</button>
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="flex-1 overflow-y-auto p-5" id="workspaceContent">
      <!-- 动态渲染 -->
    </div>

    <!-- 底部按钮栏 -->
    <div class="bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-end gap-2 shrink-0">
      <button class="btn-secondary" id="previewToggleBtn" onclick="togglePreview()">👁 预览</button>
      <button class="btn-primary" onclick="saveConfig()">💾 保存配置</button>
    </div>
  </main>
  </div><!-- end page-list-config -->

  <!-- =========== 统计配置页面 =========== -->
  <div id="page-stats-config" class="flex-1 flex flex-col overflow-hidden hidden">

    <!-- 编辑模式 -->
    <div id="statsEditMode" class="flex-1 overflow-y-auto p-6">
      <div class="section-card">
        <div class="section-header">
          <span class="section-title">📊 统计指标配置</span>
          <button class="btn-add" onclick="addStatsMetric()">+ 新增指标</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full" id="statsMetricTable">
            <thead><tr>
              <th style="width:32px"></th>
              <th style="width:40px">序号</th>
              <th>指标名称</th>
              <th>数据源表</th>
              <th>字段名</th>
              <th style="width:80px">单位</th>
              <th style="width:80px">权限</th>
              <th style="width:80px">操作</th>
            </tr></thead>
            <tbody id="statsMetricBody"></tbody>
          </table>
        </div>
        <div id="statsMetricEmpty" class="hidden text-center text-gray-400 py-10 text-sm">
          暂未配置指标，点击"+ 新增指标"开始配置
        </div>
      </div>

      <!-- 预览模式内容（编辑模式下隐藏） -->
      <div id="statsPreviewContent" class="hidden">
        <input type="hidden" id="statsLevel" value="市级" />
        <div class="flex items-center justify-between flex-wrap gap-4 mb-5">
          <div class="flex items-center gap-4 flex-wrap">
            <div class="flex items-center gap-2">
              <label class="text-sm text-gray-600 whitespace-nowrap">部门名称</label>
              <input type="text" id="statsDeptName" class="w-44" placeholder="输入部门名称搜索" />
            </div>
            <button class="btn-primary" onclick="queryStats()">🔍 查询</button>
            <button class="btn-secondary" onclick="resetStatsQuery()">重置</button>
          </div>
          <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-lg px-4 py-2">
            <label class="text-sm text-gray-600 whitespace-nowrap">预览账号等级</label>
            <select id="statsPermLevel" class="w-24" onchange="onStatsPermLevelChange()">
              <option value="省级">省级</option>
              <option value="市级" selected>市级</option>
              <option value="分局">分局</option>
              <option value="派出所">派出所</option>
            </select>
          </div>
        </div>

        <!-- 面包屑导航 -->
        <div class="flex items-center gap-0 mb-4" id="statsBreadcrumb"></div>

        <!-- 汇总卡片 -->
        <div class="grid grid-cols-2 gap-4 mb-5" id="statsCards"></div>

        <!-- 下级部门表格 -->
        <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
          <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
            <span class="font-semibold text-sm text-gray-700" id="statsTableTitle">下级部门列表</span>
            <span class="text-xs text-gray-400" id="statsTableCount"></span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full stat-table" id="statsTable">
              <thead><tr>
                <th>序号</th>
                <th>部门名称</th>
                <th>户数</th>
                <th>占比</th>
                <th>操作</th>
              </tr></thead>
              <tbody id="statsTableBody"></tbody>
            </table>
          </div>
          <div id="statsEmpty" class="hidden text-center text-gray-400 py-16 text-sm">
            暂无下级部门数据
          </div>
        </div>
      </div>
    </div>

    <!-- 底部按钮栏 -->
    <div class="bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-end gap-2 shrink-0">
      <button class="btn-secondary" id="statsPreviewBtn" onclick="toggleStatsPreview()">👁 预览</button>
      <button class="btn-primary" onclick="saveStatsConfig()">💾 保存配置</button>
    </div>
  </div>
<!-- ==================== 字段编辑弹窗 ==================== -->
<div id="fieldModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event,'fieldModal')">
  <div class="bg-white rounded-xl w-[600px] max-h-[80vh] flex flex-col shadow-2xl">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h3 class="font-semibold text-gray-800 text-base" id="fieldModalTitle">编辑字段</h3>
      <button onclick="closeModal('fieldModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto px-6 py-4" id="fieldModalBody"></div>
    <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
      <div class="flex gap-2">
        <button class="btn-secondary text-xs py-1.5 px-3" onclick="selectAllFields(true)">全选</button>
        <button class="btn-secondary text-xs py-1.5 px-3" onclick="selectAllFields(false)">取消全选</button>
      </div>
      <div class="flex gap-2">
        <button class="btn-secondary" onclick="closeModal('fieldModal')">取消</button>
        <button class="btn-primary" onclick="confirmFieldEdit()">确认</button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== 新增表单弹窗 ==================== -->
<div id="newModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event,'newModal')">
  <div class="bg-white rounded-xl w-[440px] shadow-2xl">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h3 class="font-semibold text-gray-800 text-base">新增表单</h3>
      <button onclick="closeModal('newModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="px-6 py-5 flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">列表表单名称 <span class="text-red-500">*</span></label>
        <input type="text" id="newName" class="w-full" placeholder="如：合同管理" />
      </div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="block text-sm font-medium text-gray-700">数据源表</label>
          <button type="button" class="btn-add py-0" onclick="addNewTableSelect()">+ 新增</button>
        </div>
        <div id="newTableList" class="flex flex-col gap-2"></div>
      </div>
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="block text-sm font-medium text-gray-700">模式</label>
          <button type="button" class="btn-add py-0" onclick="addNewModeSelect()">+ 新增</button>
        </div>
        <div id="newModeList" class="flex flex-col gap-2"></div>
      </div>
    </div>
    <div class="px-6 pb-5 flex justify-end gap-2">
      <button class="btn-secondary" onclick="closeModal('newModal')">取消</button>
      <button class="btn-primary" onclick="confirmNewStandard()">创建</button>
    </div>
  </div>
</div>

<!-- ==================== 修改关联表字段弹窗 ==================== -->
<div id="joinModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event,'joinModal')">
  <div class="bg-white rounded-xl w-[560px] max-h-[80vh] flex flex-col shadow-2xl">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h3 class="font-semibold text-gray-800 text-base">修改关联表字段</h3>
      <button onclick="closeModal('joinModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="px-6 py-5 flex-1 overflow-y-auto flex flex-col gap-4">
      <p class="text-sm text-gray-500">展示所有的字段可进行勾选，默认展示本标准件表的字段，但是支持修改为别的表并勾选字段。</p>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">选择表</label>
        <select id="joinTable" class="w-full" onchange="renderJoinFieldOptions()"></select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">本次新增字段权限</label>
        <select id="joinPermissionLevel" class="w-full"></select>
      </div>
      <div id="joinFieldOptions" class="border border-gray-200 rounded-lg overflow-hidden"></div>
    </div>
    <div class="px-6 pb-5 flex justify-end gap-2">
      <button class="btn-secondary" onclick="closeModal('joinModal')">取消</button>
      <button class="btn-primary" onclick="confirmJoinField()">确认</button>
    </div>
  </div>
</div>

<!-- ==================== 详情预览弹窗 ==================== -->
<div id="detailModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event,'detailModal')">
  <div class="bg-white rounded-xl w-[900px] max-h-[85vh] flex flex-col shadow-2xl">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between shrink-0">
      <h3 class="font-semibold text-gray-800 text-base">详情</h3>
      <button onclick="closeModal('detailModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto px-6 py-4" id="detailModalBody"></div>
    <div class="px-6 py-3 border-t border-gray-200 flex justify-end shrink-0">
      <button class="btn-secondary" onclick="closeModal('detailModal')">关闭</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
// ============================================================
// 预置数据
// ============================================================
const PRESET_STANDARDS = [
  {
    id: 's1', name: '清明祭扫', table: 'qingming_sweep',
    fields: [
      { key: 'act_no',       label: '活动编号',   type: 'string', active: true,  join: false },
      { key: 'act_name',     label: '活动名称',   type: 'string', active: true,  join: false },
      { key: 'location',     label: '祭扫地点',   type: 'string', active: true,  join: false },
      { key: 'org_unit',     label: '组织单位',   type: 'string', active: true,  join: false },
      { key: 'contact',      label: '联系人',     type: 'string', active: true,  join: false },
      { key: 'phone',        label: '联系电话',   type: 'string', active: true,  join: false },
      { key: 'sweep_date',   label: '祭扫日期',   type: 'date',   active: true,  join: false },

function switchMenu(menu) {
  currentMenu = menu;

  document.getElementById('menu-' + menu).classList.add('active');
  document.getElementById('page-list-config').classList.toggle('hidden', menu !== 'list');
  document.getElementById('page-stats-config').classList.toggle('hidden', menu !== 'stats');
}
let previewPermissionLevel = '省级';

let newModeRows = [];

const PERMISSION_LEVELS = ['省级', '市级', '分局', '派出所'];
const DAMENG_SCHEMA_OPTIONS = [
  'SYSDBA', 'SYS', 'CTISYS', 'SYSAUDITOR', 'SYSSSO', 'SYSJOB', 'DMHR'
];

function getDataSourceTableOptions() {
  return [...new Set(standards.map(s => s.table).filter(Boolean))];
}

function getDamengSchemaOptions() {
  const savedSchemas = standards.flatMap(s => s.schemas || (s.schema ? [s.schema] : []));
  return [...new Set([...DAMENG_SCHEMA_OPTIONS, ...savedSchemas].filter(Boolean))];
}

// 初始化每个标准件的配置
function ensureConfig(id) {
  if (!configs[id]) {
    const std = getStd(id);
    const activeFields = std.fields.filter(f => f.active);
    configs[id] = {
      listFields: activeFields.map((f, i) => ({
        key: f.key, label: f.label, listVisible: false, visible: true, width: 120,
        align: 'left', format: '', order: i, permissionLevel: '派出所',
        join: f.join || false, joinTable: f.joinTable || ''
      })),
      queryConditions: activeFields.slice(0, 2).map(f => ({
        id: uid(), field: f.key, condType: 'contains', widgetType: 'text', defaultVal: '', required: false, hidden: false
      })),
      actionButtons: [
        { id: uid(), name: '查看详情', btnType: 'primary', position: 'list-row', behavior: 'open-detail' },
        { id: uid(), name: '编辑', btnType: 'secondary', position: 'list-row', behavior: 'goto-edit' },
        { id: uid(), name: '删除', btnType: 'danger', position: 'list-row', behavior: 'call-api' },
      ]
    };
  }
  configs[id].listFields.forEach(f => {
    if (!f.permissionLevel) f.permissionLevel = '派出所';
  });
}

function getStd(id) { return standards.find(s => s.id === id); }
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function uid() { return 'u' + Math.random().toString(36).slice(2, 9); }
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}
function jsStringAttr(value) {
  return escapeHtml(JSON.stringify(value));
}

function getSearchSelectRows(type) {
  return type === 'mode' ? newModeRows : newTableRows;
}

function getSearchSelectOptions(type) {
  return type === 'mode' ? getDamengSchemaOptions() : getDataSourceTableOptions();
}

function getSearchSelectPlaceholder(type) {
  return type === 'mode' ? '请选择达梦数据库模式' : '请选择或搜索数据源表';
}

function renderSearchSelect(type, row) {
  const options = getSearchSelectOptions(type);
  const keyword = (row.search ?? row.value ?? '').trim().toLowerCase();
  const filtered = keyword
    ? options.filter(item => item.toLowerCase().includes(keyword))
    : options;
  const inputHandler = type === 'mode' ? 'filterNewModeOptions' : 'filterNewTableOptions';
  const focusHandler = type === 'mode' ? 'openNewModeOptions' : 'openNewTableOptions';
  return `
    <div class="search-select" id="${type}Select_${row.id}">
      <input type="text"
             id="${type}Input_${row.id}"
             class="search-select-input"
             value="${escapeHtml(row.search ?? row.value)}"
             placeholder="${getSearchSelectPlaceholder(type)}"
             autocomplete="off"
             oninput="${inputHandler}('${row.id}', this.value)"
             onfocus="${focusHandler}('${row.id}')" />
      <span class="search-select-arrow">⌄</span>
      <div id="${type}Options_${row.id}" class="search-select-menu hidden">
        ${renderSearchSelectOptions(type, row.id, filtered, row.value)}
      </div>
    </div>
  `;
}

function renderSearchSelectOptions(type, id, options, selectedValue) {
  if (!options.length) return '<div class="search-select-empty">无匹配结果</div>';
  const selectHandler = type === 'mode' ? 'selectNewModeOption' : 'selectNewTableOption';
  return options.map(option => `
    <button type="button"
            class="search-select-option ${selectedValue === option ? 'active' : ''}"
            onclick="${selectHandler}('${id}', ${jsStringAttr(option)})">
      ${escapeHtml(option)}
    </button>
  `).join('');
}

function renderSearchSelectOptionMenu(type, id) {
  const rows = getSearchSelectRows(type);
  const row = rows.find(item => item.id === id);
  const menu = document.getElementById(`${type}Options_${id}`);
  if (!row || !menu) return;
  const keyword = (row.search ?? row.value ?? '').trim().toLowerCase();
  const filtered = getSearchSelectOptions(type)
    .filter(item => !keyword || item.toLowerCase().includes(keyword));
  menu.innerHTML = renderSearchSelectOptions(type, id, filtered, row.value);
  menu.classList.remove('hidden');
}

function closeSearchSelectMenus(exceptId = '') {
  document.querySelectorAll('.search-select-menu').forEach(menu => {
    if (menu.id !== exceptId) menu.classList.add('hidden');
  });
}

function listFieldChange(key, prop, val) {
  const f = configs[currentId].listFields.find(f => f.key === key);
  if (f) f[prop] = val;
}

function queryCondChange(id, prop, val) {
  const c = configs[currentId].queryConditions.find(c => c.id === id);
  if (c) c[prop] = val;
}

function removeQueryCond(id) {
  configs[currentId].queryConditions = configs[currentId].queryConditions.filter(c => c.id !== id);
  document.getElementById('qrow_' + id)?.remove();
}

function addQueryCondition() {
  const std = getStd(currentId);
  const firstField = std.fields.find(f => f.active);
  const newCond = {
    id: uid(), field: firstField?.key || '', condType: 'contains',
    widgetType: 'text', defaultVal: '', required: false, hidden: false
  };
  configs[currentId].queryConditions.push(newCond);

  const tbody = document.getElementById('queryBody');
  if (tbody) tbody.innerHTML = renderQueryRows();
}

function actionBtnChange(id, prop, val) {
  const b = configs[currentId].actionButtons.find(b => b.id === id);
  if (b) b[prop] = val;
}

function removeActionBtn(id) {
  configs[currentId].actionButtons = configs[currentId].actionButtons.filter(b => b.id !== id);
  renderWorkspace();
}

function addActionButton() {
  configs[currentId].actionButtons.push({

  });

}

function openJoinModal() {
  const select = document.getElementById('joinTable');
  const permissionSelect = document.getElementById('joinPermissionLevel');
  select.innerHTML = standards.map(s => `<option value="${s.id}">${s.table}（${s.name}）</option>`).join('');
  select.value = currentId;
  permissionSelect.innerHTML = PERMISSION_LEVELS.map(level =>
    `<option value="${level}" ${level === '派出所' ? 'selected' : ''}>${level}</option>`
  ).join('');
  renderJoinFieldOptions();
  document.getElementById('joinModal').classList.remove('hidden');
}

function joinFieldKey(table, fieldKey) {
  return `join_${table}_${fieldKey}`;
}

function renderJoinFieldOptions() {
  const selectedId = document.getElementById('joinTable').value;
  const selectedStd = getStd(selectedId);
  const cfg = configs[currentId];
  const checkedKeys = new Set(cfg.listFields.map(f => f.key));
  const rows = selectedStd.fields.map(f => {
    const key = selectedId === currentId ? f.key : joinFieldKey(selectedStd.table, f.key);
    const checked = checkedKeys.has(key) ? 'checked' : '';
    return `
      <label class="flex items-center gap-3 px-4 py-2.5 border-b border-gray-100 last:border-b-0 hover:bg-gray-50 cursor-pointer">
        <input type="checkbox" class="field-checkbox join-field-checkbox" value="${f.key}" ${checked} />
        <span class="font-medium text-gray-700 min-w-[120px]">${f.label}</span>
        <span class="text-xs text-gray-400">${f.key}</span>
        <span class="ml-auto tag-text tag-${f.type || 'string'}">${f.type || 'string'}</span>
      </label>
    `;
  }).join('');
  document.getElementById('joinFieldOptions').innerHTML = rows || '<p class="text-sm text-gray-400 text-center py-6">暂无字段</p>';
}

function normalizeSelectedField(selectedStd, field, selectedId) {
  const isCurrentTable = selectedId === currentId;
  const key = isCurrentTable ? field.key : joinFieldKey(selectedStd.table, field.key);
  return {
    key,
    label: isCurrentTable ? field.label : `${selectedStd.name}-${field.label}`,
    type: field.type || 'string',
    join: !isCurrentTable,
    joinTable: isCurrentTable ? '' : selectedStd.table
  };
}

function confirmJoinField() {
  const selectedId = document.getElementById('joinTable').value;
  const selectedStd = getStd(selectedId);
  const std = getStd(currentId);
  const permissionLevel = document.getElementById('joinPermissionLevel')?.value || '派出所';
  const checkedFields = Array.from(document.querySelectorAll('.join-field-checkbox:checked')).map(el => el.value);
  if (!checkedFields.length) { alert('请至少勾选一个字段'); return; }

  let addedCount = 0;
  checkedFields.forEach(fieldKey => {
    const field = selectedStd.fields.find(f => f.key === fieldKey);
    if (!field) return;
    const normalized = normalizeSelectedField(selectedStd, field, selectedId);
    const key = normalized.key;
    if (configs[currentId].listFields.some(f => f.key === key)) return;

    if (!std.fields.some(f => f.key === key)) {
      std.fields.push({
        key, label: normalized.label, type: normalized.type, active: true,
        join: normalized.join, joinTable: normalized.joinTable
      });
    }
    configs[currentId].listFields.push({
      key, label: normalized.label, listVisible: false, visible: true, width: 120, align: 'left', format: '',
      order: configs[currentId].listFields.length, permissionLevel, join: normalized.join,
      joinTable: normalized.joinTable
    });
    addedCount++;
  });

  closeModal('joinModal');
  renderWorkspace();
  showToast(addedCount ? `已添加 ${addedCount} 个字段` : '所选字段已在列表中');
}

// 拖拽排序
// ============================================================
let dragKey = null;

function initDragSort() {
  // 已通过 HTML attribute 绑定
}

function dragStart(e, key) {
  dragKey = key;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function dropRow(e, targetKey) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragKey === targetKey) return;
  const fields = configs[currentId].listFields;
  const fromIdx = fields.findIndex(f => f.key === dragKey);
  const toIdx = fields.findIndex(f => f.key === targetKey);
  if (fromIdx < 0 || toIdx < 0) return;
  const [item] = fields.splice(fromIdx, 1);
  fields.splice(toIdx, 0, item);
  renderWorkspace();
  dragKey = null;
}

// ============================================================
// 预览模式
// ============================================================
function updatePreviewBtn() {
  const btn = document.getElementById('previewToggleBtn');
  if (!btn) return;
  if (isPreviewMode) {
    btn.textContent = '✏ 返回编辑';
    btn.className = 'btn-primary';
  } else {
    btn.textContent = '👁 预览';
    btn.className = 'btn-secondary';
  }
}

function togglePreview() {
  isPreviewMode = !isPreviewMode;
  renderWorkspace();
}

function canViewByPermission(field, viewerLevel = previewPermissionLevel) {
  const viewerIndex = PERMISSION_LEVELS.indexOf(viewerLevel);
  const fieldIndex = PERMISSION_LEVELS.indexOf(field.permissionLevel || '派出所');
  if (viewerIndex < 0 || fieldIndex < 0) return true;
  return viewerIndex <= fieldIndex;
}

function changePreviewPermissionLevel(level) {
  previewPermissionLevel = level;
  renderWorkspace();
}

function renderPreviewPermissionSelect() {
  return `
    <div class="flex justify-end mb-3">
      <label class="flex items-center gap-2 text-sm text-gray-600">
        <span>预览等级</span>
        <select style="width:96px;height:32px" onchange="changePreviewPermissionLevel(this.value)">
          ${PERMISSION_LEVELS.map(level => `<option value="${level}" ${previewPermissionLevel === level ? 'selected' : ''}>${level}</option>`).join('')}
        </select>
      </label>
    </div>
  `;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPreview(std, cfg) {
  const visibleFields = cfg.listFields.filter(f => f.listVisible && canViewByPermission(f));
  const allFields = cfg.listFields;
  if (!visibleFields.length) {
    return `
      ${renderPreviewPermissionSelect()}
      <div class="text-center text-gray-400 py-20">
        <p class="text-lg mb-2">暂无列表展示字段</p>
        <p class="text-sm">请在"列展示字段"中开启需要展示的字段，或调整当前预览等级</p>
      </div>
    `;
  }
  const mockData = generateMockData(std, cfg, 8);

  // 查询区
  const queryHtml = renderPreviewQueryForm(cfg, std);

  // 表头
  const ths = visibleFields.map(f =>
    `<th style="min-width:${f.width}px">${escHtml(f.customLabel || f.label)}</th>`
  ).join('');

  // 表体
  const trs = mockData.map((row, idx) => {
    const tds = visibleFields.map(f =>
      `<td>${escHtml(row[f.key])}</td>`
    ).join('');
    return `<tr>${tds}<td class="text-center whitespace-nowrap"><button class="text-blue-500 hover:text-blue-700 text-sm font-medium" onclick="openDetailModal(${idx})">详情</button></td></tr>`;
  }).join('');

  return `
    ${renderPreviewPermissionSelect()}
    ${queryHtml}
    <div class="preview-table-wrap">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead><tr>${ths}<th style="width:64px" class="text-center">操作</th></tr></thead>
          <tbody>${trs}</tbody>
        </table>
      </div>
      <div class="px-4 py-3 border-t border-gray-100 flex items-center justify-between text-sm text-gray-500">
        <span>共 ${mockData.length} 条记录</span>
        <span class="text-xs text-gray-400">预览数据为模拟生成</span>
      </div>
    </div>
  `;
}

function renderPreviewQueryForm(cfg, std) {
  if (!cfg.queryConditions.length) return '';
  const fields = std.fields.filter(f => f.active);
  const listFieldMap = new Map(cfg.listFields.map(f => [f.key, f]));

  const visibleConditions = cfg.queryConditions.filter(c => {
    const listField = listFieldMap.get(c.field);
    return !listField || canViewByPermission(listField);
  });
  if (!visibleConditions.length) return '';

  const items = visibleConditions.map(c => {
    const field = fields.find(f => f.key === c.field);
    const label = field ? field.label : c.field;
    let input = '';

    if (c.widgetType === 'select') {
      input = `<select class="w-full" style="height:32px"><option value="">全部${label}</option><option>选项1</option><option>选项2</option></select>`;
    } else if (c.widgetType === 'date_range') {
      input = `<div class="flex gap-1"><input type="text" class="flex-1" placeholder="开始日期" style="height:32px" /><input type="text" class="flex-1" placeholder="结束日期" style="height:32px" /></div>`;
    } else if (c.widgetType === 'number') {
      input = `<input type="number" class="w-full" placeholder="请输入${label}" style="height:32px" />`;
    } else if (c.widgetType === 'multi_select') {
      input = `<select class="w-full" style="height:32px" multiple><option>选项1</option><option>选项2</option><option>选项3</option></select>`;
    } else {
      input = `<input type="text" class="w-full" placeholder="请输入${label}" style="height:32px" ${c.defaultVal ? `value="${escHtml(c.defaultVal)}"` : ''} />`;
    }

    return `<div class="flex flex-col gap-1" style="min-width:160px">
      <label class="text-xs text-gray-500">${escHtml(label)}${c.required ? ' <span class="text-red-400">*</span>' : ''}</label>
      ${input}
    </div>`;
  }).join('');

  return `<div class="preview-query-box">
    <div class="flex flex-wrap gap-4 items-end">
      ${items}
      <div class="flex gap-2 pb-0.5">
        <button class="btn-primary" style="height:32px;padding:0 20px">查询</button>
        <button class="btn-secondary" style="height:32px;padding:0 16px">重置</button>
      </div>
    </div>
  </div>`;
}

    rows.push(row);

  return rows;
}

function openDetailModal(rowIdx) {
  const std = getStd(currentId);
  const cfg = configs[currentId];
  const mockData = generateMockData(std, cfg, 8);
  const row = mockData[rowIdx];
  if (!row) return;

  // 所有列展示字段
  const allFields = isPreviewMode ? cfg.listFields.filter(f => canViewByPermission(f)) : cfg.listFields;

  // 判断长文本字段（label含"地址"/"备注"/"描述"等，值较长时跨列）
  const isLongField = (f) => {
    const val = String(row[f.key] || '');
    return val.length > 20 || /地址|备注|描述|说明|原因|事由|场所/.test(f.label);
  };

  const fieldsHtml = allFields.map(f => {
    const val = row[f.key] !== undefined ? row[f.key] : '-';
    const fullClass = isLongField(f) ? 'detail-field-full' : '';
    return `<div class="detail-field ${fullClass}">
      <div class="detail-field-label">${escHtml(f.customLabel || f.label)}</div>
      <div class="detail-field-value">${escHtml(val) || '<span class="text-gray-300">-</span>'}</div>
    </div>`;
  }).join('');

  document.getElementById('detailModalBody').innerHTML =
    `<div class="detail-grid gap-x-8">${fieldsHtml}</div>`;
  document.getElementById('detailModal').classList.remove('hidden');
}

const STATS_CONFIG_KEY = 'sc_stats_metrics';
let statsMetrics = JSON.parse(localStorage.getItem(STATS_CONFIG_KEY) || 'null') || [
  { id: 'm1', name: '户数', table: 'household', field: 'household_count', unit: '户', order: 1 },
  { id: 'm2', name: '人口数', table: 'household', field: 'population', unit: '人', order: 2 },
];
let isStatsPreviewMode = false;
let statsPreviewPermLevel = '市级'; // 预览账号等级

function uid2() { return 'm' + Date.now() + Math.random().toString(36).slice(2, 6); }

// ============================================================
// 统计工具函数
// ============================================================
function findNode(path, node = STATS_TREE) {
  if (!path.length) return node;
  const child = node.children.find(c => c.name === path[0]);
  return child ? findNode(path.slice(1), child) : null;
}

function countChildren(node) {
  return node.children.length;
}

function sumChildrenHouseholds(node) {
  return node.children.reduce((s, c) => s + c.households, 0);
}

// ============================================================
// 统计配置状态
// ============================================================
let statsState = {
  breadcrumb: [{ name: '湖北省', level: '市级' }],
  currentNode: STATS_TREE.children[0]
};

// ============================================================
// 编辑模式 - 指标配置
// ============================================================
function renderStatsMetrics() {
  const tbody = document.getElementById('statsMetricBody');
  const emptyEl = document.getElementById('statsMetricEmpty');

  if (!statsMetrics.length) {
    tbody.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }

  emptyEl.classList.add('hidden');
  const tables = getDataSourceTableOptions();

  tbody.innerHTML = statsMetrics.map((m, i) => `
    <tr id="smrow_${m.id}" draggable="true"
        ondragstart="statsDragStart(event,'${m.id}')"
        ondragover="statsDragOver(event)"
        ondrop="statsDropRow(event,'${m.id}')"
        ondragleave="statsDragLeave(event)">
      <td class="drag-handle text-gray-300 text-lg px-2">⠿</td>
      <td class="text-gray-400 text-center">${i + 1}</td>
      <td><input type="text" value="${m.name}" style="width:100px"
           onchange="updateStatsMetric('${m.id}','name',this.value)" /></td>
      <td>
        <select style="width:130px" onchange="updateStatsMetric('${m.id}','table',this.value)">
          ${tables.map(t => `<option value="${t}" ${m.table === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
      </td>
      <td><input type="text" value="${m.field}" style="width:120px"
           onchange="updateStatsMetric('${m.id}','field',this.value)" /></td>
      <td><input type="text" value="${m.unit}" style="width:60px"
           onchange="updateStatsMetric('${m.id}','unit',this.value)" /></td>
      <td>
        <select style="width:86px" onchange="updateStatsMetric('${m.id}','permissionLevel',this.value)">
          ${PERMISSION_LEVELS.map(level => `<option value="${level}" ${(m.permissionLevel || '派出所') === level ? 'selected' : ''}>${level}</option>`).join('')}
        </select>
      </td>
      <td>
        <button class="btn-danger" onclick="deleteStatsMetric('${m.id}')">删除</button>
      </td>
    </tr>
  `).join('');
}
function addStatsMetric() {
  statsMetrics.push({ id: uid2(), name: '', table: getDataSourceTableOptions()[0] || '', field: '', unit: '', order: statsMetrics.length + 1, permissionLevel: '派出所' });
  renderStatsMetrics();
}

function updateStatsMetric(id, key, value) {
  const m = statsMetrics.find(m => m.id === id);
  if (m) { m[key] = value; }
}

function deleteStatsMetric(id) {
  statsMetrics = statsMetrics.filter(m => m.id !== id);
  renderStatsMetrics();
}

let statsDragKey = null;
function statsDragStart(e, id) {
  statsDragKey = id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function statsDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function statsDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function statsDropRow(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (statsDragKey === targetId) return;
  const fromIdx = statsMetrics.findIndex(m => m.id === statsDragKey);
  const toIdx = statsMetrics.findIndex(m => m.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [item] = statsMetrics.splice(fromIdx, 1);
  statsMetrics.splice(toIdx, 0, item);
  renderStatsMetrics();
  statsDragKey = null;
}

function saveStatsConfig() {
  localStorage.setItem(STATS_CONFIG_KEY, JSON.stringify(statsMetrics));
  showToast('统计配置已保存');
}

  isStatsPreviewMode = !isStatsPreviewMode;

    document.getElementById('statsPreviewContent').classList.remove('hidden');

}

function canViewMetricByPerm(metric) {
  const viewerIdx = PERMISSION_LEVELS.indexOf(statsPreviewPermLevel);
  const metricIdx = PERMISSION_LEVELS.indexOf(metric.permissionLevel || '派出所');
  if (viewerIdx < 0 || metricIdx < 0) return true;
  return viewerIdx <= metricIdx;
}

function onStatsPermLevelChange() {
  statsPreviewPermLevel = document.getElementById('statsPermLevel').value;
  renderStatsPage();
}

function updateStatsPreviewBtn() {
  const btn = document.getElementById('statsPreviewBtn');

  if (isStatsPreviewMode) {
    btn.textContent = '✏ 返回编辑';

    btn.textContent = '👁 预览';

}

// ============================================================
// 统计查询
// ============================================================
function queryStats() {
  const level = document.getElementById('statsLevel').value;
  const deptName = document.getElementById('statsDeptName').value.trim();

  let target = STATS_TREE;
  let bc = [{ name: '省级', level: '省级' }];

  if (deptName) {
    const found = findNodeByName(STATS_TREE, deptName);
    if (found) {
      target = found.node;
      bc = found.path.map((name, i) => {
        const levels = ['省级', '市级', '分局', '派出所'];
        return { name, level: levels[Math.min(i, 3)] };
      });
    }
  } else if (level !== '省级') {
    const defaultMap = { '省级': '湖北省', '市级': '湖北省', '分局': '武汉市', '派出所': '武昌分局' };
    const found = findNodeByName(STATS_TREE, defaultMap[level] || '湖北省');
    if (found) {
      target = found.node;
      bc = found.path.map((name, i) => {
        const levels = ['省级', '市级', '分局', '派出所'];
        return { name, level: levels[Math.min(i, 3)] };
      });
    }
  }

  statsState.currentNode = target;
  statsState.breadcrumb = bc;
  document.getElementById('statsLevel').value = level;
  renderStatsPage();
}

function resetStatsQuery() {
  document.getElementById('statsLevel').value = '市级';
  document.getElementById('statsDeptName').value = '';
  statsState = { breadcrumb: [{ name: '湖北省', level: '市级' }], currentNode: STATS_TREE.children[0] };
  renderStatsPage();
}

function onStatsLevelChange() {
  const level = document.getElementById('statsLevel').value;
  const defaultMap = { '省级': '湖北省', '市级': '湖北省', '分局': '武汉市', '派出所': '武昌分局' };
  const found = findNodeByName(STATS_TREE, defaultMap[level] || '省级');
  if (found) {
    statsState.currentNode = found.node;
    statsState.breadcrumb = found.path.map((name, i) => {
      const levels = ['省级', '市级', '分局', '派出所'];
      return { name, level: levels[Math.min(i, 3)] };
    });
  }
  renderStatsPage();
}

function findNodeByName(node, name, path = []) {
  if (node.name === name) return { node, path };
  for (const child of node.children) {
    const result = findNodeByName(child, name, [...path, node.name]);
    if (result) return result;
  }
  return null;
}

// ============================================================
// 逐级下钻
// ============================================================
function drillToChild(deptName) {
  const child = statsState.currentNode.children.find(c => c.name === deptName);
  if (!child || !child.children.length) return;

  statsState.currentNode = child;
  statsState.breadcrumb.push({ name: child.name, level: child.level });
  document.getElementById('statsLevel').value = child.level;
  renderStatsPage();
}

// ============================================================
// 面包屑
// ============================================================
function breadcrumbClick(index) {
  const item = statsState.breadcrumb[index];
  const found = findNodeByName(STATS_TREE, item.name);
  if (found) {
    statsState.currentNode = found.node;
    statsState.breadcrumb = statsState.breadcrumb.slice(0, index + 1);
    document.getElementById('statsLevel').value = item.level;
    renderStatsPage();
  }
}

// ============================================================
// 渲染统计页
// ============================================================
function renderStatsPage() {
  renderStatsBreadcrumb();
  renderStatsCards();
  renderStatsTable();
}

function renderStatsBreadcrumb() {
  const container = document.getElementById('statsBreadcrumb');
  container.innerHTML = statsState.breadcrumb.map((item, i) => {
    const isLast = i === statsState.breadcrumb.length - 1;
    const cls = isLast ? 'breadcrumb-item active' : 'breadcrumb-item';
    const onclick = isLast ? '' : `onclick="breadcrumbClick(${i})"`;
    return `<span class="${cls}" ${onclick}>${item.name}</span>`;
  }).join('<span class="breadcrumb-sep">▶</span>');
}

function renderStatsCards() {
  const node = statsState.currentNode;
  const childrenCount = countChildren(node);

  // Build cards from configured metrics
  const cards = [
    { icon: '🏛️', label: '当前部门', value: node.name },
  ];

  cards.push(
    { icon: '📋', label: '下级部门数', value: childrenCount + ' 个' },
  );

  const display = cards;

  document.getElementById('statsCards').innerHTML = display.map(c => `
    <div class="stat-card">
      <div class="flex items-center justify-between">
        <span class="stat-card-label">${c.label}</span>
        <span class="stat-card-icon" style="background:#f1f5f9">${c.icon}</span>
      </div>
      <div class="stat-card-value">${c.value}</div>
    </div>
  `).join('');
}

function renderStatsTable() {
  // Dynamically build table header from configured metrics
  const visibleMetrics = statsMetrics.filter(m => canViewMetricByPerm(m));
  const theadRow = document.querySelector('#statsTable thead tr');
  if (theadRow) {
    const metricThs = visibleMetrics.map(m => { const u = m.unit ? ' (' + m.unit + ')' : ''; return '<th>' + m.name + u + '</th>'; }).join('');
    theadRow.innerHTML = '<th>序号</th><th>部门名称</th>' + metricThs;
  }

  const children = statsState.currentNode.children;

  document.getElementById('statsTableTitle').textContent =
    children.length ? '下级部门列表' : '暂无下级部门';
  document.getElementById('statsTableCount').textContent =
    children.length ? `共 ${children.length} 个部门` : '';

  const tbody = document.getElementById('statsTableBody');
  const emptyEl = document.getElementById('statsEmpty');

  if (!children.length) {
    tbody.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }

  emptyEl.classList.add('hidden');

  const levelColors = { '市级': '#3b82f6', '分局': '#8b5cf6', '派出所': '#6b7280' };

  // Build table header dynamically from metrics
  const metricCols = visibleMetrics.map(m => m.name);

  tbody.innerHTML = children.map((c, i) => {
    const color = levelColors[c.level] || '#6b7280';
    const hasChildren = c.children.length > 0;
    const clickable = hasChildren ? 'cursor:pointer' : '';
    const onclick = hasChildren ? `onclick="drillToChild('${c.name}')"` : '';

    // Build metric value cells
    const metricCells = metricCols.map(name => {
      if (name === '户数') return `<td>${c.households.toLocaleString()}</td>`;
      if (name === '人口数') return `<td>${((c.households || 0) * 3.2).toLocaleString()}</td>`;
      return '<td class="text-gray-300">—</td>';
    }).join('');

    return `<tr style="${clickable}" ${onclick}>
      <td>${i + 1}</td>
      <td>
        <span style="color:${color};font-weight:600">${c.name}</span>
        <span class="text-xs text-gray-400 ml-1">${c.level}</span>
        ${hasChildren ? `<span class="text-xs text-blue-500 ml-1">(下级${c.children.length}个)</span>` : ''}
      </td>
      ${metricCells}
    </tr>`;
  }).join('');
}

// ============================================================
// 初始化统计页
// ============================================================
function initStatsPage() {
  renderStatsMetrics();
  updateStatsPreviewBtn();
  // In edit mode, hide preview content
  if (!isStatsPreviewMode) {
    const previewEl = document.getElementById('statsPreviewContent');
    if (previewEl) previewEl.classList.add('hidden');
  }
}

// 切换到统计页时首次渲染
const _origSwitchMenu2 = switchMenu;
switchMenu = function(menu) {
  _origSwitchMenu2(menu);
  if (menu === 'stats') {
    initStatsPage();
  }
};</script>
</body>
</html>
