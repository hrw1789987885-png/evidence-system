<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>列表表单配置</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
  .active-item { border-left: 3px solid #3b82f6; background: #eff6ff; }
  .inactive-item { border-left: 3px solid transparent; }
  .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
  .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
  .drag-handle { cursor: grab; }
  .drag-handle:active { cursor: grabbing; }
  .dragging { opacity: 0.4; }
  .drag-over { border-top: 2px solid #3b82f6; }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: white; padding: 10px 24px;
    border-radius: 8px; font-size: 14px; z-index: 9999;
    transition: opacity 0.3s;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .tag-text { font-size: 11px; padding: 1px 6px; border-radius: 4px; }
  .tag-join { background: #fef3c7; color: #92400e; }
  .tag-string { background: #e0f2fe; color: #075985; }
  .tag-number { background: #dcfce7; color: #166534; }
  .tag-date { background: #fae8ff; color: #86198f; }
  .tag-enum { background: #fee2e2; color: #991b1b; }
  input[type="text"], input[type="number"], select {
    border: 1px solid #d1d5db; border-radius: 5px; padding: 4px 8px;
    font-size: 13px; outline: none; background: white;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
  }
  .section-card {
    background: white; border: 1px solid #e5e7eb; border-radius: 8px;
    margin-bottom: 16px; overflow: hidden;
  }
  .section-header {
    background: #f8fafc; padding: 10px 16px;
    border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-weight: 600; font-size: 14px; color: #1e293b; }
  .btn-primary {
    background: #3b82f6; color: white; border: none;
    padding: 7px 18px; border-radius: 6px; font-size: 13px;
    cursor: pointer; font-weight: 500;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary {
    background: white; color: #374151; border: 1px solid #d1d5db;
    padding: 7px 16px; border-radius: 6px; font-size: 13px;
    cursor: pointer; font-weight: 500;
  }
  .btn-secondary:hover { background: #f9fafb; }
  .btn-danger { background: white; color: #ef4444; border: 1px solid #fca5a5;
    padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-add {
    color: #3b82f6; font-size: 13px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 0; border: none; background: none;
  }
  .btn-add:hover { color: #2563eb; }
  th { background: #f8fafc; font-size: 12px; color: #6b7280; font-weight: 600;
       padding: 8px 10px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  td { font-size: 13px; padding: 8px 10px; border-bottom: 1px solid #f1f5f9;
       color: #374151; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .field-checkbox { width: 15px; height: 15px; cursor: pointer; accent-color: #3b82f6; }
  .switch { position: relative; display: inline-flex; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-slider {
    position: absolute; inset: 0; cursor: pointer; border-radius: 999px;
    background: #d1d5db; transition: background 0.2s;
  }
  .switch-slider::before {
    content: ""; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px;
    background: white; border-radius: 50%; transition: transform 0.2s;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.25);
  }
  .switch input:checked + .switch-slider { background: #3b82f6; }
  .switch input:checked + .switch-slider::before { transform: translateX(16px); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

<!-- 顶部导航栏 -->
<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-3 shrink-0">
  <div class="w-7 h-7 bg-blue-600 rounded-md flex items-center justify-center">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
      <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
      <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
    </svg>
  </div>
  <span class="font-semibold text-gray-800 text-base">列表表单配置</span>
  <span class="text-gray-300 text-sm ml-1">/ 列表表单配置后台</span>
  <div class="ml-auto flex items-center gap-2 text-xs text-gray-400">
    <span id="saveStatus">未保存</span>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">

  <!-- =========== 左侧列表表单 =========== -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
    <div class="px-4 py-3 border-b border-gray-100">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">列表表单</p>
    </div>
    <div class="flex-1 overflow-y-auto py-2" id="sidebarList"></div>
    <div class="p-3 border-t border-gray-100">
      <button class="w-full btn-secondary text-blue-600 border-blue-200 hover:bg-blue-50 flex items-center justify-center gap-1"
              onclick="openNewModal()">
        <span class="text-lg leading-none">+</span> 新增表单
      </button>
    </div>
  </aside>

  <!-- =========== 右侧工作区 =========== -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- 右侧顶部：标准件名称 + Tab -->
    <div class="bg-white border-b border-gray-200 px-6 py-0 shrink-0">
      <div class="flex items-center gap-4 pt-3 pb-0">
        <span class="text-base font-semibold text-gray-800" id="workspaceTitle">客户管理</span>
        <span class="text-xs text-gray-400 bg-gray-100 rounded px-2 py-0.5" id="workspaceTable">customer</span>
      </div>
      <div class="flex gap-6 mt-2">
        <button class="tab-active pb-2 text-sm" id="tab-list" onclick="switchTab('list')">列表配置</button>
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="flex-1 overflow-y-auto p-5" id="workspaceContent">
      <!-- 动态渲染 -->
    </div>

    <!-- 底部保存按钮 -->
    <div class="bg-white border-t border-gray-200 px-6 py-3 flex justify-end shrink-0">
      <button class="btn-primary" onclick="saveConfig()">💾 保存配置</button>
    </div>
  </main>
</div>

<!-- ==================== 字段编辑弹窗 ==================== -->
<div id="fieldModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event,'fieldModal')">
  <div class="bg-white rounded-xl w-[600px] max-h-[80vh] flex flex-col shadow-2xl">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h3 class="font-semibold text-gray-800 text-base" id="fieldModalTitle">编辑字段</h3>
      <button onclick="closeModal('fieldModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto px-6 py-4" id="fieldModalBody"></div>
    <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
      <div class="flex gap-2">
        <button class="btn-secondary text-xs py-1.5 px-3" onclick="selectAllFields(true)">全选</button>
        <button class="btn-secondary text-xs py-1.5 px-3" onclick="selectAllFields(false)">取消全选</button>
      </div>
      <div class="flex gap-2">
        <button class="btn-secondary" onclick="closeModal('fieldModal')">取消</button>
        <button class="btn-primary" onclick="confirmFieldEdit()">确认</button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== 新增表单弹窗 ==================== -->
<div id="newModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event,'newModal')">
  <div class="bg-white rounded-xl w-[440px] shadow-2xl">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h3 class="font-semibold text-gray-800 text-base">新增表单</h3>
      <button onclick="closeModal('newModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="px-6 py-5 flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">列表表单名称 <span class="text-red-500">*</span></label>
        <input type="text" id="newName" class="w-full" placeholder="如：合同管理" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">数据源表名</label>
        <input type="text" id="newTable" class="w-full" placeholder="如：contract（选填）" />
      </div>
    </div>
    <div class="px-6 pb-5 flex justify-end gap-2">
      <button class="btn-secondary" onclick="closeModal('newModal')">取消</button>
      <button class="btn-primary" onclick="confirmNewStandard()">创建</button>
    </div>
  </div>
</div>

<!-- ==================== 修改关联表字段弹窗 ==================== -->
<div id="joinModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event,'joinModal')">
  <div class="bg-white rounded-xl w-[560px] max-h-[80vh] flex flex-col shadow-2xl">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
      <h3 class="font-semibold text-gray-800 text-base">修改关联表字段</h3>
      <button onclick="closeModal('joinModal')" class="text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>
    </div>
    <div class="px-6 py-5 flex-1 overflow-y-auto flex flex-col gap-4">
      <p class="text-sm text-gray-500">展示所有的字段可进行勾选，默认展示本标准件表的字段，但是支持修改为别的表并勾选字段。</p>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">选择表</label>
        <select id="joinTable" class="w-full" onchange="renderJoinFieldOptions()"></select>
      </div>
      <div id="joinFieldOptions" class="border border-gray-200 rounded-lg overflow-hidden"></div>
    </div>
    <div class="px-6 pb-5 flex justify-end gap-2">
      <button class="btn-secondary" onclick="closeModal('joinModal')">取消</button>
      <button class="btn-primary" onclick="confirmJoinField()">确认</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
// ============================================================
// 预置数据
// ============================================================
const PRESET_STANDARDS = [
  {
    id: 's1', name: '清明祭扫', table: 'qingming_sweep',
    fields: [
      { key: 'act_no',       label: '活动编号',   type: 'string', active: true,  join: false },
      { key: 'act_name',     label: '活动名称',   type: 'string', active: true,  join: false },
      { key: 'location',     label: '祭扫地点',   type: 'string', active: true,  join: false },
      { key: 'org_unit',     label: '组织单位',   type: 'string', active: true,  join: false },
      { key: 'contact',      label: '联系人',     type: 'string', active: true,  join: false },
      { key: 'phone',        label: '联系电话',   type: 'string', active: true,  join: false },
      { key: 'sweep_date',   label: '祭扫日期',   type: 'date',   active: true,  join: false },
      { key: 'appoint_num',  label: '预约人数',   type: 'number', active: true,  join: false },
      { key: 'actual_num',   label: '实到人数',   type: 'number', active: true,  join: false },
      { key: 'status',       label: '活动状态',   type: 'enum',   active: true,  join: false },
      { key: 'remark',       label: '备注',       type: 'string', active: false, join: false },
    ]
  },
  {
    id: 's2', name: '任务统计查询', table: 'task_stat',
    fields: [
      { key: 'task_no',      label: '任务编号',   type: 'string', active: true,  join: false },
      { key: 'task_name',    label: '任务名称',   type: 'string', active: true,  join: false },
      { key: 'module',       label: '所属模块',   type: 'enum',   active: true,  join: false },
      { key: 'resp_unit',    label: '负责单位',   type: 'string', active: true,  join: false },
      { key: 'owner',        label: '负责人',     type: 'string', active: true,  join: false },
      { key: 'issued_at',    label: '下发时间',   type: 'date',   active: true,  join: false },
      { key: 'deadline',     label: '截止时间',   type: 'date',   active: true,  join: false },
      { key: 'finished_at',  label: '完成时间',   type: 'date',   active: false, join: false },
      { key: 'status',       label: '任务状态',   type: 'enum',   active: true,  join: false },
      { key: 'complete_rate',label: '完成率(%)',  type: 'number', active: true,  join: false },
      { key: 'remark',       label: '备注',       type: 'string', active: false, join: false },
    ]
  },
  {
    id: 's3', name: '矛盾纠纷', table: 'dispute',
    fields: [
      { key: 'dispute_no',   label: '纠纷编号',   type: 'string', active: true,  join: false },
      { key: 'dispute_type', label: '纠纷类型',   type: 'enum',   active: true,  join: false },
      { key: 'location',     label: '发生地点',   type: 'string', active: true,  join: false },
      { key: 'party_name',   label: '当事人姓名', type: 'string', active: true,  join: false },
      { key: 'phone',        label: '联系电话',   type: 'string', active: true,  join: false },
      { key: 'reg_time',     label: '登记时间',   type: 'date',   active: true,  join: false },
      { key: 'handle_unit',  label: '受理单位',   type: 'string', active: true,  join: false },
      { key: 'mediator',     label: '调解人',     type: 'string', active: true,  join: false },
      { key: 'med_status',   label: '调解状态',   type: 'enum',   active: true,  join: false },
      { key: 'med_result',   label: '调解结果',   type: 'enum',   active: false, join: false },
      { key: 'close_time',   label: '结案时间',   type: 'date',   active: false, join: false },
      { key: 'remark',       label: '备注',       type: 'string', active: false, join: false },
    ]
  },
  {
    id: 's4', name: '标准件使用情况统计', table: 'standard_usage',
    fields: [
      { key: 'stat_no',      label: '统计编号',       type: 'string', active: true,  join: false },
      { key: 'std_name',     label: '标准件名称',     type: 'string', active: true,  join: false },
      { key: 'module',       label: '所属模块',       type: 'enum',   active: true,  join: false },
      { key: 'call_count',   label: '调用次数',       type: 'number', active: true,  join: false },
      { key: 'active_users', label: '活跃用户数',     type: 'number', active: true,  join: false },
      { key: 'last_used_at', label: '最近使用时间',   type: 'date',   active: true,  join: false },
      { key: 'avg_resp_ms',  label: '平均响应时间(ms)',type: 'number', active: true,  join: false },
      { key: 'error_count',  label: '错误次数',       type: 'number', active: true,  join: false },
      { key: 'avail_rate',   label: '可用率(%)',      type: 'number', active: true,  join: false },
      { key: 'version',      label: '版本号',         type: 'string', active: false, join: false },
      { key: 'remark',       label: '备注',           type: 'string', active: false, join: false },
    ]
  },
];

// ============================================================
// 状态管理
// ============================================================
const PRESET_VERSION = 'v2';
if (localStorage.getItem('sc_version') !== PRESET_VERSION) {
  localStorage.removeItem('sc_standards');
  localStorage.removeItem('sc_configs');
  localStorage.setItem('sc_version', PRESET_VERSION);
}
let standards = JSON.parse(localStorage.getItem('sc_standards') || 'null') || deepClone(PRESET_STANDARDS);
let configs = JSON.parse(localStorage.getItem('sc_configs') || '{}');
let currentId = standards[0].id;
let currentTab = 'list';
let editingFieldId = null; // 正在编辑字段的标准件id

// 初始化每个标准件的配置
function ensureConfig(id) {
  if (!configs[id]) {
    const std = getStd(id);
    const activeFields = std.fields.filter(f => f.active);
    configs[id] = {
      listFields: activeFields.map((f, i) => ({
        key: f.key, label: f.label, listVisible: false, visible: true, width: 120,
        align: 'left', format: '', order: i, join: f.join || false, joinTable: f.joinTable || ''
      })),
      queryConditions: activeFields.slice(0, 2).map(f => ({
        id: uid(), field: f.key, condType: 'contains', widgetType: 'text', defaultVal: '', required: false
      })),
      actionButtons: [
        { id: uid(), name: '查看详情', btnType: 'primary', position: 'list-row', behavior: 'open-detail' },
        { id: uid(), name: '编辑', btnType: 'secondary', position: 'list-row', behavior: 'goto-edit' },
        { id: uid(), name: '删除', btnType: 'danger', position: 'list-row', behavior: 'call-api' },
      ]
    };
  }
}

function getStd(id) { return standards.find(s => s.id === id); }
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function uid() { return 'u' + Math.random().toString(36).slice(2, 9); }

// ============================================================
// 渲染左侧列表
// ============================================================
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = standards.map(s => `
    <div class="px-3 py-1.5">
      <div class="flex items-center gap-2 px-3 py-2.5 rounded-lg cursor-pointer transition-colors
                  ${s.id === currentId ? 'bg-blue-50' : 'hover:bg-gray-50'}
                  ${s.id === currentId ? 'border-l-2 border-blue-500 pl-2.5' : ''}"
           onclick="selectStandard('${s.id}')">
        <div class="w-6 h-6 rounded-md bg-blue-100 flex items-center justify-center shrink-0">
          <span class="text-blue-600 text-xs font-bold">${s.name[0]}</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-800 truncate">${s.name}</p>
          <p class="text-xs text-gray-400">${s.table}</p>
        </div>
      </div>
    </div>
  `).join('');
}

function selectStandard(id) {
  currentId = id;
  currentTab = 'list';
  renderSidebar();
  renderWorkspace();
}

// ============================================================
// 字段编辑弹窗
// ============================================================
function openFieldModal(id, e) {
  if (e) e.stopPropagation();
  editingFieldId = id;
  const std = getStd(id);
  document.getElementById('fieldModalTitle').textContent = `编辑字段 — ${std.name}`;
  const body = document.getElementById('fieldModalBody');

  const typeMap = { string:'text文本', number:'数字', date:'日期', enum:'枚举' };
  const typeTagClass = { string:'tag-string', number:'tag-number', date:'tag-date', enum:'tag-enum' };

  body.innerHTML = `
    <div class="text-xs text-gray-500 mb-3">勾选需要启用的字段，已启用字段将出现在列表配置中。</div>
    <div class="flex flex-col gap-1">
      ${std.fields.map(f => `
        <label class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-50 cursor-pointer">
          <input type="checkbox" class="field-checkbox" id="fck_${f.key}" ${f.active ? 'checked' : ''} />
          <div class="flex-1 flex items-center gap-2">
            <span class="text-sm text-gray-800 font-medium">${f.label}</span>
            <span class="text-xs text-gray-400">(${f.key})</span>
          </div>
          <span class="tag-text ${typeTagClass[f.type] || 'tag-string'}">${typeMap[f.type] || f.type}</span>
          ${f.join ? `<span class="tag-text tag-join">联表·${f.joinTable}</span>` : ''}
        </label>
      `).join('')}
    </div>
  `;
  document.getElementById('fieldModal').classList.remove('hidden');
}

function selectAllFields(checked) {
  document.querySelectorAll('#fieldModalBody input[type="checkbox"]')
    .forEach(cb => cb.checked = checked);
}

function confirmFieldEdit() {
  const std = getStd(editingFieldId);
  std.fields.forEach(f => {
    const cb = document.getElementById('fck_' + f.key);
    if (cb) f.active = cb.checked;
  });
  // 重建该标准件的配置
  delete configs[editingFieldId];
  ensureConfig(editingFieldId);

  // 如果当前正在查看该标准件，刷新
  if (currentId === editingFieldId) renderWorkspace();
  closeModal('fieldModal');
  renderSidebar();
  showToast('字段配置已更新');
}

// ============================================================
// 新增表单弹窗
// ============================================================
function openNewModal() {
  document.getElementById('newName').value = '';
  document.getElementById('newTable').value = '';
  document.getElementById('newModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('newName').focus(), 100);
}

function confirmNewStandard() {
  const name = document.getElementById('newName').value.trim();
  const table = document.getElementById('newTable').value.trim() || name.toLowerCase().replace(/\s+/g, '_');
  if (!name) { alert('请输入列表表单名称'); return; }
  if (standards.find(s => s.name === name)) { alert('名称已存在，请换一个名称'); return; }
  const id = 's' + uid();
  const newStd = {
    id, name, table,
    fields: [
      { key: 'id', label: 'ID', type: 'number', active: true, join: false },
      { key: 'name', label: '名称', type: 'string', active: true, join: false },
      { key: 'status', label: '状态', type: 'enum', active: true, join: false },
      { key: 'created_at', label: '创建时间', type: 'date', active: true, join: false },
      { key: 'remark', label: '备注', type: 'string', active: false, join: false },
    ]
  };
  standards.push(newStd);
  closeModal('newModal');
  // 切换到新标准件，并弹出字段编辑
  currentId = id;
  renderSidebar();
  openFieldModal(id);
}

// ============================================================
// 渲染工作区
// ============================================================
function renderWorkspace() {
  ensureConfig(currentId);
  const std = getStd(currentId);
  document.getElementById('workspaceTitle').textContent = std.name;
  document.getElementById('workspaceTable').textContent = std.table;
  document.getElementById('tab-list').className = 'tab-active pb-2 text-sm';

  const cfg = configs[currentId];
  const content = document.getElementById('workspaceContent');

  content.innerHTML = renderListTab(std, cfg);
  initDragSort();
  content.innerHTML += renderActionButtons(cfg);
}

function switchTab(tab) {
  currentTab = 'list';
  renderWorkspace();
}

// ============================================================
// 列表配置 Tab
// ============================================================
function renderListTab(std, cfg) {
  const rows = cfg.listFields.map((f, idx) => `
    <tr id="row_${f.key}" draggable="true" ondragstart="dragStart(event,'${f.key}')"
        ondragover="dragOver(event)" ondrop="dropRow(event,'${f.key}')" ondragleave="dragLeave(event)">
      <td class="drag-handle text-gray-300 text-lg px-2">⠿</td>
      <td class="text-center">
        <label class="switch" title="列表展示">
          <input type="checkbox" ${f.listVisible ? 'checked' : ''}
                 onchange="listFieldChange('${f.key}','listVisible',this.checked)" />
          <span class="switch-slider"></span>
        </label>
      </td>
      <td class="font-medium text-gray-700">${f.label}</td>
      <td><span class="text-xs text-gray-400">${f.key}</span></td>
      <td><input type="text" value="${f.label}" style="width:90px"
                 onchange="listFieldChange('${f.key}','customLabel',this.value)" /></td>
      <td><input type="number" value="${f.width}" style="width:64px" min="60" max="400"
                 onchange="listFieldChange('${f.key}','width',+this.value)" /></td>
      ${f.join ? `<td><span class="tag-text tag-join">联表·${f.joinTable}</span></td>` : '<td></td>'}
    </tr>
  `).join('');

  return `
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">📋 列展示字段</span>
        <span class="text-xs text-gray-400">拖拽 ⠿ 可调整列顺序</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full" id="listFieldTable">
          <thead><tr>
            <th style="width:32px"></th>
            <th style="width:74px">列表展示</th>
            <th>字段名</th>
            <th>Key</th>
            <th>列标题</th>
            <th>宽度</th>
            <th>联表</th>
          </tr></thead>
          <tbody id="listFieldBody">${rows}</tbody>
        </table>
      </div>
      <div class="px-4 py-3 border-t border-gray-100">
        <button class="btn-add" onclick="openJoinModal()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a.5.5 0 0 1 .5.5v6h6a.5.5 0 0 1 0 1h-6v6a.5.5 0 0 1-1 0v-6h-6a.5.5 0 0 1 0-1h6v-6A.5.5 0 0 1 8 1z"/></svg>
          修改关联表字段
        </button>
      </div>
    </div>

    <div class="section-card">
      <div class="section-header">
        <span class="section-title">🔍 查询条件</span>
        <span class="text-xs text-gray-400">配置列表页顶部筛选项</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full" id="queryTable">
          <thead><tr>
            <th>绑定字段</th>
            <th>条件类型</th>
            <th>控件类型</th>
            <th>默认值</th>
            <th style="width:52px">必填</th>
            <th style="width:52px">操作</th>
          </tr></thead>
          <tbody id="queryBody">${renderQueryRows()}</tbody>
        </table>
      </div>
      <div class="px-4 py-3 border-t border-gray-100">
        <button class="btn-add" onclick="addQueryCondition()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a.5.5 0 0 1 .5.5v6h6a.5.5 0 0 1 0 1h-6v6a.5.5 0 0 1-1 0v-6h-6a.5.5 0 0 1 0-1h6v-6A.5.5 0 0 1 8 1z"/></svg>
          添加条件
        </button>
      </div>
    </div>
  `;
}

function renderQueryRows() {
  const cfg = configs[currentId];
  const std = getStd(currentId);
  const fieldOpts = std.fields.filter(f=>f.active).map(f => `<option value="${f.key}">${f.label}</option>`).join('');
  const condOpts = ['contains|包含','equals|等于','starts_with|开头是','gt|大于','lt|小于','between|区间'].map(v=>{const[k,t]=v.split('|');return `<option value="${k}">${t}</option>`;}).join('');
  const widgetOpts = ['text|文本框','select|下拉框','date_range|日期范围','number|数字输入','multi_select|多选框'].map(v=>{const[k,t]=v.split('|');return `<option value="${k}">${t}</option>`;}).join('');

  return cfg.queryConditions.map(c => `
    <tr id="qrow_${c.id}">
      <td><select style="width:110px" onchange="queryCondChange('${c.id}','field',this.value)">
        ${std.fields.filter(f=>f.active).map(f=>`<option value="${f.key}" ${c.field===f.key?'selected':''}>${f.label}</option>`).join('')}
      </select></td>
      <td><select style="width:80px" onchange="queryCondChange('${c.id}','condType',this.value)">
        ${['contains|包含','equals|等于','starts_with|开头','gt|大于','lt|小于','between|区间'].map(v=>{const[k,t]=v.split('|');return `<option value="${k}" ${c.condType===k?'selected':''}>${t}</option>`;}).join('')}
      </select></td>
      <td><select style="width:90px" onchange="queryCondChange('${c.id}','widgetType',this.value)">
        ${['text|文本框','select|下拉','date_range|日期范围','number|数字','multi_select|多选'].map(v=>{const[k,t]=v.split('|');return `<option value="${k}" ${c.widgetType===k?'selected':''}>${t}</option>`;}).join('')}
      </select></td>
      <td><input type="text" value="${c.defaultVal||''}" style="width:90px" placeholder="（空）"
                 onchange="queryCondChange('${c.id}','defaultVal',this.value)" /></td>
      <td class="text-center"><input type="checkbox" class="field-checkbox" ${c.required?'checked':''}
                 onchange="queryCondChange('${c.id}','required',this.checked)" /></td>
      <td><button class="btn-danger" onclick="removeQueryCond('${c.id}')">删除</button></td>
    </tr>
  `).join('');
}

// ============================================================
// 操作按钮区块
// ============================================================
function renderActionButtons(cfg) {
  const rows = cfg.actionButtons.map(b => `
    <tr>
      <td><input type="text" value="${b.name}" style="width:100px"
                 onchange="actionBtnChange('${b.id}','name',this.value)" /></td>
      <td><select style="width:80px" onchange="actionBtnChange('${b.id}','btnType',this.value)">
        ${[['primary','主要'],['secondary','次要'],['danger','危险']].map(([v,t])=>`<option value="${v}" ${b.btnType===v?'selected':''}>${t}</option>`).join('')}
      </select></td>
      <td><select style="width:110px" onchange="actionBtnChange('${b.id}','position',this.value)">
        ${[['list-row','列表行内'],['detail-top','详情页顶部'],['detail-bottom','详情页底部']].map(([v,t])=>`<option value="${v}" ${b.position===v?'selected':''}>${t}</option>`).join('')}
      </select></td>
      <td><select style="width:110px" onchange="actionBtnChange('${b.id}','behavior',this.value)">
        ${[['open-detail','打开详情弹窗'],['goto-edit','跳转编辑页'],['call-api','调用接口'],['custom-url','自定义URL']].map(([v,t])=>`<option value="${v}" ${b.behavior===v?'selected':''}>${t}</option>`).join('')}
      </select></td>
      <td><button class="btn-danger" onclick="removeActionBtn('${b.id}')">删除</button></td>
    </tr>
  `).join('');

  return `
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">🖱 操作按钮</span>
        <span class="text-xs text-gray-400">影响列表行内及详情页按钮</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead><tr>
            <th>按钮名称</th><th>按钮类型</th><th>显示位置</th><th>行为</th>
            <th style="width:52px">操作</th>
          </tr></thead>
          <tbody id="actionBody">${rows}</tbody>
        </table>
      </div>
      <div class="px-4 py-3 border-t border-gray-100">
        <button class="btn-add" onclick="addActionButton()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a.5.5 0 0 1 .5.5v6h6a.5.5 0 0 1 0 1h-6v6a.5.5 0 0 1-1 0v-6h-6a.5.5 0 0 1 0-1h6v-6A.5.5 0 0 1 8 1z"/></svg>
          添加按钮
        </button>
      </div>
    </div>
  `;
}

// ============================================================
// 数据变更操作
// ============================================================
function listFieldChange(key, prop, val) {
  const f = configs[currentId].listFields.find(f => f.key === key);
  if (f) f[prop] = val;
}

function queryCondChange(id, prop, val) {
  const c = configs[currentId].queryConditions.find(c => c.id === id);
  if (c) c[prop] = val;
}

function removeQueryCond(id) {
  configs[currentId].queryConditions = configs[currentId].queryConditions.filter(c => c.id !== id);
  document.getElementById('qrow_' + id)?.remove();
}

function addQueryCondition() {
  const std = getStd(currentId);
  const firstField = std.fields.find(f => f.active);
  const newCond = {
    id: uid(), field: firstField?.key || '', condType: 'contains',
    widgetType: 'text', defaultVal: '', required: false
  };
  configs[currentId].queryConditions.push(newCond);
  // 重新渲染查询条件
  const tbody = document.getElementById('queryBody');
  if (tbody) tbody.innerHTML = renderQueryRows();
}

function actionBtnChange(id, prop, val) {
  const b = configs[currentId].actionButtons.find(b => b.id === id);
  if (b) b[prop] = val;
}

function removeActionBtn(id) {
  configs[currentId].actionButtons = configs[currentId].actionButtons.filter(b => b.id !== id);
  renderWorkspace();
}

function addActionButton() {
  configs[currentId].actionButtons.push({
    id: uid(), name: '新按钮', btnType: 'secondary',
    position: 'list-row', behavior: 'open-detail'
  });
  renderWorkspace();
}

// ============================================================
// 联表字段弹窗
// ============================================================
function openJoinModal() {
  const select = document.getElementById('joinTable');
  select.innerHTML = standards.map(s => `<option value="${s.id}">${s.table}（${s.name}）</option>`).join('');
  select.value = currentId;
  renderJoinFieldOptions();
  document.getElementById('joinModal').classList.remove('hidden');
}

function joinFieldKey(table, fieldKey) {
  return `join_${table}_${fieldKey}`;
}

function renderJoinFieldOptions() {
  const selectedId = document.getElementById('joinTable').value;
  const selectedStd = getStd(selectedId);
  const cfg = configs[currentId];
  const checkedKeys = new Set(cfg.listFields.map(f => f.key));
  const rows = selectedStd.fields.map(f => {
    const key = selectedId === currentId ? f.key : joinFieldKey(selectedStd.table, f.key);
    const checked = checkedKeys.has(key) ? 'checked' : '';
    return `
      <label class="flex items-center gap-3 px-4 py-2.5 border-b border-gray-100 last:border-b-0 hover:bg-gray-50 cursor-pointer">
        <input type="checkbox" class="field-checkbox join-field-checkbox" value="${f.key}" ${checked} />
        <span class="font-medium text-gray-700 min-w-[120px]">${f.label}</span>
        <span class="text-xs text-gray-400">${f.key}</span>
        <span class="ml-auto tag-text tag-${f.type || 'string'}">${f.type || 'string'}</span>
      </label>
    `;
  }).join('');
  document.getElementById('joinFieldOptions').innerHTML = rows || '<p class="text-sm text-gray-400 text-center py-6">暂无字段</p>';
}

function normalizeSelectedField(selectedStd, field, selectedId) {
  const isCurrentTable = selectedId === currentId;
  const key = isCurrentTable ? field.key : joinFieldKey(selectedStd.table, field.key);
  return {
    key,
    label: isCurrentTable ? field.label : `${selectedStd.name}-${field.label}`,
    type: field.type || 'string',
    join: !isCurrentTable,
    joinTable: isCurrentTable ? '' : selectedStd.table
  };
}

function confirmJoinField() {
  const selectedId = document.getElementById('joinTable').value;
  const selectedStd = getStd(selectedId);
  const std = getStd(currentId);
  const checkedFields = Array.from(document.querySelectorAll('.join-field-checkbox:checked')).map(el => el.value);
  if (!checkedFields.length) { alert('请至少勾选一个字段'); return; }

  let addedCount = 0;
  checkedFields.forEach(fieldKey => {
    const field = selectedStd.fields.find(f => f.key === fieldKey);
    if (!field) return;
    const normalized = normalizeSelectedField(selectedStd, field, selectedId);
    const key = normalized.key;
    if (configs[currentId].listFields.some(f => f.key === key)) return;

    if (!std.fields.some(f => f.key === key)) {
      std.fields.push({
        key, label: normalized.label, type: normalized.type, active: true,
        join: normalized.join, joinTable: normalized.joinTable
      });
    }
    configs[currentId].listFields.push({
      key, label: normalized.label, listVisible: false, visible: true, width: 120, align: 'left', format: '',
      order: configs[currentId].listFields.length, join: normalized.join,
      joinTable: normalized.joinTable
    });
    addedCount++;
  });

  closeModal('joinModal');
  renderWorkspace();
  showToast(addedCount ? `已添加 ${addedCount} 个字段` : '所选字段已在列表中');
}

// ============================================================
// 拖拽排序
// ============================================================
let dragKey = null;

function initDragSort() {
  // 已通过 HTML attribute 绑定
}

function dragStart(e, key) {
  dragKey = key;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function dropRow(e, targetKey) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragKey === targetKey) return;
  const fields = configs[currentId].listFields;
  const fromIdx = fields.findIndex(f => f.key === dragKey);
  const toIdx = fields.findIndex(f => f.key === targetKey);
  if (fromIdx < 0 || toIdx < 0) return;
  const [item] = fields.splice(fromIdx, 1);
  fields.splice(toIdx, 0, item);
  renderWorkspace();
  dragKey = null;
}

// ============================================================
// 保存配置
// ============================================================
function saveConfig() {
  localStorage.setItem('sc_standards', JSON.stringify(standards));
  localStorage.setItem('sc_configs', JSON.stringify(configs));
  document.getElementById('saveStatus').textContent = '已保存 ' + new Date().toLocaleTimeString();
  showToast('配置保存成功 ✓');
}

// ============================================================
// 工具函数
// ============================================================
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function closeModalOnOverlay(e, id) {
  if (e.target.id === id) closeModal(id);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  t.style.opacity = '1';
  setTimeout(() => {
    t.style.opacity = '0';
    setTimeout(() => t.classList.add('hidden'), 300);
  }, 2000);
}

// ESC 关闭弹窗
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['fieldModal','newModal','joinModal'].forEach(id => {
      if (!document.getElementById(id).classList.contains('hidden')) closeModal(id);
    });
  }
});

// ============================================================
// 初始化
// ============================================================
(function init() {
  standards.forEach(s => ensureConfig(s.id));
  renderSidebar();
  renderWorkspace();
})();
</script>
